<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Music</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#121212">

<style>
:root{
  --bg:#121212;
  --card:#181818;
  --text:#fff;
  --muted:#b3b3b3;
  --green:#1db954;
}

<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
  
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:-apple-system,Arial;
  background:var(--bg);
  color:var(--text);
  padding:16px;
}

header{
  display:flex;
  justify-content:space-between;
  margin-bottom:12px;
}

.logo{font-weight:700;font-size:20px;}

.add{
  background:var(--green);
  border:none;
  padding:8px 14px;
  border-radius:20px;
  color:#000;
  font-weight:600;
}

/* PLAYER */
.now{
  background:linear-gradient(145deg,#1e1e1e,#111);
  padding:16px;
  border-radius:16px;
  margin-bottom:14px;
}

.art{
  width:100%;
  aspect-ratio:1;
  border-radius:14px;
  background:radial-gradient(circle,#333,#111);
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:10px;
  overflow:hidden;
}

.vinyl{
  width:80%;
  height:80%;
  border-radius:50%;
  background:
    radial-gradient(circle at center,#111 0 10%,#333 10% 11%,#111 11% 20%,#333 20% 21%,#111 21% 100%);
  position:relative;
  animation:spin 3s linear infinite;
  display:none;
}

.vinyl::after{
  content:"";
  position:absolute;
  width:18%;
  height:18%;
  background:var(--green);
  border-radius:50%;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

.playing .vinyl{display:block;}

@keyframes spin{
  from{transform:rotate(0)}
  to{transform:rotate(360deg)}
}

.title{font-size:18px;font-weight:600;}
.sub{font-size:12px;color:var(--muted);margin-bottom:10px;}

/* CONTROLS */
.controls{
  display:flex;
  justify-content:center;
  gap:10px;
}

.btn{
  background:#282828;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

.play{
  background:var(--green);
  color:#000;
  font-weight:700;
}

/* LIST */
.queue{margin-top:14px;}

.item{
  display:flex;
  justify-content:space-between;
  padding:12px;
  margin:6px 0;
  background:var(--card);
  border-radius:10px;
}

.item.active{
  border-left:3px solid var(--green);
}

.small{font-size:12px;color:var(--muted);}

.del{
  background:none;
  border:none;
  color:#aaa;
  cursor:pointer;
}
.del:hover{color:red;}

input{display:none;}
</style>
</head>

<body>

<header>
  <div class="logo">Music</div>
  <button class="add" onclick="file.click()">Add</button>
</header>

<div class="now" id="now">

  <div class="art">
    <div class="vinyl"></div>
  </div>

  <div class="title" id="title">No song playing</div>
  <div class="sub">Add music to start</div>

  <audio id="audio"></audio>

  <div class="controls">
    <button class="btn" onclick="prev()">Prev</button>
    <button class="btn play" onclick="toggle()" id="playBtn">Play</button>
    <button class="btn" onclick="next()">Next</button>
  </div>

</div>

<div class="queue" id="queue"></div>

<input type="file" id="file" accept="audio/*,video/mp4,.mp3,.m4a,.wav,.aac" multiple>

<script>
const file=document.getElementById("file");
const audio=document.getElementById("audio");
const queue=document.getElementById("queue");
const playBtn=document.getElementById("playBtn");
const now=document.getElementById("now");
const title=document.getElementById("title");

let tracks=[];
let current=0;
let playing=false;

/* ---------- IndexedDB ---------- */
let db;

function openDB(){
  return new Promise(res=>{
    const req=indexedDB.open("MusicDB",1);
    req.onupgradeneeded=e=>{
      e.target.result.createObjectStore("tracks",{keyPath:"id",autoIncrement:true});
    };
    req.onsuccess=()=>res(req.result);
  });
}

async function saveFile(file){
  const db=await openDB();
  return new Promise(res=>{
    const tx=db.transaction("tracks","readwrite");
    tx.objectStore("tracks").add({name:file.name,blob:file});
    tx.oncomplete=()=>res();
  });
}

async function loadFiles(){
  const db=await openDB();
  return new Promise(res=>{
    const tx=db.transaction("tracks","readonly");
    const req=tx.objectStore("tracks").getAll();

    req.onsuccess=()=>{
      tracks=req.result.map(t=>({
        name:t.name,
        url:URL.createObjectURL(t.blob)
      }));
      render();
      res();
    };
  });
}

/* ---------- PLAY ---------- */
function play(i){
  current=i;
  audio.src=tracks[i].url;
  audio.play();

  playing=true;
  playBtn.textContent="Pause";
  now.classList.add("playing");

  title.textContent=tracks[i].name;
  render();
}

function toggle(){
  if(!tracks.length) return;

  if(playing){
    audio.pause();
    playing=false;
    playBtn.textContent="Play";
    now.classList.remove("playing");
  }else{
    audio.play();
    playing=true;
    playBtn.textContent="Pause";
    now.classList.add("playing");
  }
}

function next(){play((current+1)%tracks.length);}
function prev(){play((current-1+tracks.length)%tracks.length);}

/* ---------- FILES ---------- */
file.addEventListener("change",async e=>{
  const files=[...e.target.files];

  for(let f of files){
    await saveFile(f);
  }

  await loadFiles();
  play(tracks.length-1);
});

/* ---------- RENDER ---------- */
function render(){
  queue.innerHTML="";

  tracks.forEach((t,i)=>{
    const div=document.createElement("div");
    div.className="item"+(i===current?" active":"");

    div.innerHTML=`
      <div onclick="play(${i})">
        ${t.name}
        <div class="small">local</div>
      </div>
      <button class="del" onclick="remove(${i})">Remove</button>
    `;

    queue.appendChild(div);
  });
}

/* REMOVE */
async function remove(i){
  tracks.splice(i,1);
  render();
}

/* INIT */
loadFiles();
</script>

</body>
</html>
