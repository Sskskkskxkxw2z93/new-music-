<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music App</title>

<style>
:root{
  --bg:#121212;
  --card:#181818;
  --text:#fff;
  --muted:#b3b3b3;
  --green:#1db954;
}

<link rel="icon" type="image/png" href="./icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="./icon-192.png">
<link rel="apple-touch-icon" sizes="192x192" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Music">
<meta name="theme-color" content="#121212">
<link rel="manifest" href="manifest.json">

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:-apple-system,Arial;
  background:var(--bg);
  color:var(--text);
  padding:16px;
}

header{
  display:flex;
  justify-content:space-between;
  margin-bottom:12px;
}

.logo{font-weight:700;font-size:20px;}

.add{
  background:var(--green);
  border:none;
  padding:8px 14px;
  border-radius:20px;
  color:#000;
  font-weight:600;
}

/* PLAYER */
.now{
  background:linear-gradient(145deg,#1e1e1e,#111);
  padding:16px;
  border-radius:16px;
  margin-bottom:14px;
}

.art{
  width:100%;
  aspect-ratio:1;
  border-radius:14px;
  background:radial-gradient(circle,#333,#111);
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:10px;
}

.vinyl{
  width:80%;
  height:80%;
  border-radius:50%;
  background:
    radial-gradient(circle at center,#111 0 10%,#333 10% 11%,#111 11% 20%,#333 20% 21%,#111 21% 100%);
  animation:spin 3s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0)}
  to{transform:rotate(360deg)}
}

.title{font-size:18px;font-weight:600;}

/* PROGRESS */
.progress-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin:10px 0;
  font-size:12px;
  color:var(--muted);
}

.progress-row input{
  flex:1;
  accent-color:var(--green);
}

/* CONTROLS */
.controls{
  display:flex;
  justify-content:center;
  gap:10px;
}

.btn{
  background:#282828;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

.play{
  background:var(--green);
  color:#000;
  font-weight:700;
}

/* QUEUE */
.queue{margin-top:14px;}

.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  margin:6px 0;
  background:var(--card);
  border-radius:10px;
  cursor:grab;
}

.item.dragging{opacity:0.5;}

.del{
  background:none;
  border:none;
  color:#aaa;
  cursor:pointer;
}
.del:hover{color:red;}

input[type="file"]{display:none;}
</style>
</head>

<body>

<header>
  <div class="logo">Music</div>
  <button class="add" onclick="file.click()">Add</button>
</header>

<div class="now">

  <div class="art"><div class="vinyl"></div></div>

  <div class="title" id="title">No song playing</div>

  <audio id="audio"></audio>

  <div class="progress-row">
    <span id="currentTime">0:00</span>
    <input type="range" id="progress" min="0" max="100" value="0">
    <span id="duration">0:00</span>
  </div>

  <div class="controls">
    <button class="btn" onclick="prev()">Prev</button>
    <button class="btn play" onclick="toggle()" id="playBtn">Play</button>
    <button class="btn" onclick="next()">Next</button>
  </div>

</div>

<div class="queue" id="queue"></div>

<input type="file" id="file" accept="audio/*,.mp3,.m4a,.wav,.aac" multiple>

<script>
const file=document.getElementById("file");
const audio=document.getElementById("audio");
const queue=document.getElementById("queue");
const title=document.getElementById("title");
const playBtn=document.getElementById("playBtn");
const progress=document.getElementById("progress");
const currentTimeEl=document.getElementById("currentTime");
const durationEl=document.getElementById("duration");

let tracks=[];
let currentId=null;
let playing=false;

/* DB */
function openDB(){
  return new Promise(res=>{
    const req=indexedDB.open("MusicDB",1);
    req.onupgradeneeded=e=>{
      e.target.result.createObjectStore("tracks",{keyPath:"id",autoIncrement:true});
    };
    req.onsuccess=()=>res(req.result);
  });
}

/* SAVE */
async function saveFile(file){
  const db=await openDB();
  return new Promise(res=>{
    const tx=db.transaction("tracks","readwrite");
    const req=tx.objectStore("tracks").add({name:file.name,blob:file});
    req.onsuccess=()=>res(req.result);
  });
}

/* LOAD */
async function loadFiles(){
  const db=await openDB();
  return new Promise(res=>{
    const tx=db.transaction("tracks","readonly");
    const req=tx.objectStore("tracks").getAll();

    req.onsuccess=()=>{
      tracks=req.result.map(t=>({
        id:t.id,
        name:t.name,
        blob:t.blob,
        url:URL.createObjectURL(t.blob)
      }));
      render();
      res();
    };
  });
}

/* CLEAN NAME */
function clean(n){
  return n.replace(/\.[^/.]+$/,"");
}

/* PLAY */
function playById(id){
  const t=tracks.find(x=>x.id===id);
  if(!t) return;

  currentId=id;
  audio.src=t.url;
  audio.play();

  playing=true;
  playBtn.textContent="Pause";

  title.textContent=clean(t.name);
  render();
}

/* TOGGLE */
function toggle(){
  if(!tracks.length) return;

  if(playing){
    audio.pause();
    playing=false;
    playBtn.textContent="Play";
  }else{
    audio.play();
    playing=true;
    playBtn.textContent="Pause";
  }
}

/* NEXT / PREV */
function next(){
  let i=tracks.findIndex(t=>t.id===currentId);
  i=(i+1)%tracks.length;
  playById(tracks[i].id);
}

function prev(){
  let i=tracks.findIndex(t=>t.id===currentId);
  i=(i-1+tracks.length)%tracks.length;
  playById(tracks[i].id);
}

/* PROGRESS */
audio.addEventListener("timeupdate",()=>{
  if(audio.duration){
    progress.value=(audio.currentTime/audio.duration)*100;
    currentTimeEl.textContent=format(audio.currentTime);
    durationEl.textContent=format(audio.duration);
  }
});

progress.addEventListener("input",()=>{
  audio.currentTime=(progress.value/100)*audio.duration;
});

function format(s){
  if(isNaN(s)) return "0:00";
  const m=Math.floor(s/60);
  const sec=Math.floor(s%60);
  return `${m}:${sec<10?"0":""}${sec}`;
}

/* DELETE */
async function remove(id){
  const db=await openDB();
  const tx=db.transaction("tracks","readwrite");
  tx.objectStore("tracks").delete(id);

  const i=tracks.findIndex(t=>t.id===id);

  if(i>-1){
    URL.revokeObjectURL(tracks[i].url);
    tracks.splice(i,1);
  }

  if(currentId===id){
    audio.pause();
    audio.src="";
    currentId=null;
    playing=false;
    title.textContent="No song playing";
    playBtn.textContent="Play";
    progress.value=0;
    currentTimeEl.textContent="0:00";
    durationEl.textContent="0:00";
  }

  render();
}

/* RENDER */
function render(){
  queue.innerHTML="";

  tracks.forEach(t=>{
    const div=document.createElement("div");
    div.className="item";
    div.draggable=true;

    div.innerHTML=`
      <div onclick="playById(${t.id})">
        ${clean(t.name)}
      </div>
      <button class="del" onclick="remove(${t.id})">Remove</button>
    `;

    div.addEventListener("dragstart",()=>div.classList.add("dragging"));
    div.addEventListener("dragend",()=>{
      div.classList.remove("dragging");
      saveOrder();
    });

    queue.appendChild(div);
  });
}

/* DRAG SORT */
queue.addEventListener("dragover",e=>{
  e.preventDefault();

  const after=getAfter(e.clientY);
  const dragging=document.querySelector(".dragging");

  if(!after) queue.appendChild(dragging);
  else queue.insertBefore(dragging,after);
});

function getAfter(y){
  const els=[...queue.querySelectorAll(".item:not(.dragging)")];

  return els.reduce((closest,child)=>{
    const box=child.getBoundingClientRect();
    const offset=y-box.top-box.height/2;

    if(offset<0 && offset>closest.offset){
      return {offset,element:child};
    }
    return closest;
  },{offset:-Infinity}).element;
}

/* SAVE ORDER */
function saveOrder(){
  const newOrder=[...queue.querySelectorAll(".item")].map(div=>{
    const name=div.innerText;
    return tracks.find(t=>clean(t.name)===name);
  });

  tracks=newOrder.filter(Boolean);
}

/* INIT */
file.addEventListener("change",async e=>{
  for(let f of e.target.files) await saveFile(f);
  loadFiles();
});

loadFiles();
</script>

</body>
</html>
