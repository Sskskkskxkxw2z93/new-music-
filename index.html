<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music App</title>

<!-- PWA manifest -->

<link rel="manifest" href="manifest.json">

<!-- FIX 1: Safari ignores the manifest for the home screen icon.
     You MUST declare it here directly. -->

<link rel="apple-touch-icon" href="icon-192.png">

<!-- Safari PWA meta tags -->

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Music">
<meta name="theme-color" content="#121212">

<style>
:root{
  --bg:#121212;
  --card:#181818;
  --text:#fff;
  --muted:#b3b3b3;
  --green:#1db954;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:-apple-system,Arial;
  background:var(--bg);
  color:var(--text);
  padding:16px;
}

header{
  display:flex;
  justify-content:space-between;
  margin-bottom:12px;
}

.logo{font-weight:700;font-size:20px;}

.add{
  background:var(--green);
  border:none;
  padding:8px 14px;
  border-radius:20px;
  color:#000;
  font-weight:600;
}

/* PLAYER */
.now{
  background:linear-gradient(145deg,#1e1e1e,#111);
  padding:16px;
  border-radius:16px;
  margin-bottom:14px;
}

.art{
  width:100%;
  aspect-ratio:1;
  border-radius:14px;
  background:radial-gradient(circle,#333,#111);
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:10px;
}

.vinyl{
  width:80%;
  height:80%;
  border-radius:50%;
  background:
    radial-gradient(circle at center,#111 0 10%,#333 10% 11%,#111 11% 20%,#333 20% 21%,#111 21% 100%);
  animation:spin 3s linear infinite;
  animation-play-state:paused;
}

.vinyl.spinning{
  animation-play-state:running;
}

@keyframes spin{
  from{transform:rotate(0)}
  to{transform:rotate(360deg)}
}

.title{font-size:18px;font-weight:600;}

/* PROGRESS */
.progress-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin:10px 0;
  font-size:12px;
  color:var(--muted);
}

.progress-row input{
  flex:1;
  accent-color:var(--green);
}

/* CONTROLS */
.controls{
  display:flex;
  justify-content:center;
  gap:10px;
}

.btn{
  background:#282828;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

.play{
  background:var(--green);
  color:#000;
  font-weight:700;
}

/* QUEUE */
.queue{margin-top:14px;}

.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  margin:6px 0;
  background:var(--card);
  border-radius:10px;
  cursor:default;
  user-select:none;
  transition:opacity 0.15s, background 0.15s;
}

.track-name{
  flex:1;
  cursor:pointer;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.del{
  background:#e53935;
  border:none;
  color:#fff;
  cursor:pointer;
  flex-shrink:0;
  width:24px;
  height:24px;
  border-radius:50%;
  font-size:14px;
  line-height:1;
  display:none;
  align-items:center;
  justify-content:center;
  font-weight:700;
  padding:0;
}

.editing .del{display:flex;}

/* EDIT MODE */
.queue-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:6px;
}

.queue-label{
  font-size:13px;
  color:var(--muted);
  font-weight:600;
  letter-spacing:0.05em;
  text-transform:uppercase;
}

.edit-btn{
  background:none;
  border:1px solid #444;
  color:var(--muted);
  padding:4px 12px;
  border-radius:20px;
  font-size:12px;
  cursor:pointer;
}
.edit-btn.active{
  border-color:var(--green);
  color:var(--green);
}

.reorder-btns{
  display:none;
  gap:4px;
  margin-right:8px;
  flex-shrink:0;
}

.editing .reorder-btns{display:flex;}

.move-btn{
  background:#333;
  border:none;
  color:#fff;
  width:28px;
  height:28px;
  border-radius:6px;
  font-size:14px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}
.move-btn:active{background:var(--green);color:#000;}
.move-btn:disabled{opacity:0.2;cursor:default;}

input[type="file"]{display:none;}
</style>

</head>

<body>

<header>
  <div class="logo">Music</div>
  <button class="add" onclick="file.click()">Add</button>
</header>

<div class="now">

  <div class="art"><div class="vinyl" id="vinyl"></div></div>

  <div class="title" id="title">No song playing</div>

<audio id="audio"></audio>

  <!-- PROGRESS (display only, no seeking) -->

  <div class="progress-row">
    <span id="currentTime">0:00</span>
    <input type="range" id="progress" min="0" max="100" value="0" step="0.1" style="pointer-events:none;">
    <span id="duration">0:00</span>
  </div>

  <div class="controls">
    <button class="btn" onclick="prev()">Prev</button>
    <button class="btn play" onclick="toggle()" id="playBtn">Play</button>
    <button class="btn" onclick="next()">Next</button>
  </div>

</div>

<div class="queue-header">
  <span class="queue-label">Queue</span>
  <button class="edit-btn" id="editBtn" onclick="toggleEdit()">Edit</button>
</div>
<div class="queue" id="queue"></div>

<input type="file" id="file" accept="audio/*,.mp3,.m4a,.wav,.aac" multiple>

<script>
const fileInput=document.getElementById("file");
const audio=document.getElementById("audio");
const queueEl=document.getElementById("queue");
const titleEl=document.getElementById("title");
const playBtn=document.getElementById("playBtn");
const progressEl=document.getElementById("progress");
const currentTimeEl=document.getElementById("currentTime");
const durationEl=document.getElementById("duration");
const vinyl=document.getElementById("vinyl");

let tracks=[];
let currentId=null;
let playing=false;
let editMode=false;

/* ── DB ─────────────────────────────────────────── */
function openDB(){
  return new Promise(res=>{
    const req=indexedDB.open("MusicDB",2);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains("tracks")){
        db.createObjectStore("tracks",{keyPath:"id",autoIncrement:true});
      }
      if(!db.objectStoreNames.contains("order")){
        db.createObjectStore("order",{keyPath:"key"});
      }
    };
    req.onsuccess=()=>res(req.result);
  });
}

async function saveFile(f){
  const db=await openDB();
  return new Promise(res=>{
    const tx=db.transaction("tracks","readwrite");
    const req=tx.objectStore("tracks").add({name:f.name,blob:f});
    req.onsuccess=()=>res(req.result);
  });
}

async function loadFiles(){
  const db=await openDB();
  return new Promise(res=>{
    const tx=db.transaction("tracks","readonly");
    const req=tx.objectStore("tracks").getAll();
    req.onsuccess=()=>{
      tracks=req.result.map(t=>({
        id:t.id,
        name:t.name,
        blob:t.blob,
        url:URL.createObjectURL(t.blob)
      }));
      render();
      res();
    };
  });
}

/* ── HELPERS ────────────────────────────────────── */
function clean(n){return n.replace(/\.[^/.]+$/,"");}

function format(s){
  if(!s||isNaN(s)) return "0:00";
  const m=Math.floor(s/60);
  const sec=Math.floor(s%60);
  return `${m}:${sec<10?"0":""}${sec}`;
}

/* ── PLAYBACK ───────────────────────────────────── */
function playById(id){
  const t=tracks.find(x=>x.id===id);
  if(!t) return;
  currentId=id;

  // Reset progress bar on new song
  progressEl.value=0;
  currentTimeEl.textContent="0:00";
  durationEl.textContent="0:00";

  audio.src=t.url;
  audio.play();
  playing=true;
  playBtn.textContent="Pause";
  titleEl.textContent=clean(t.name);
  vinyl.classList.add("spinning");
  render();
}

function toggle(){
  if(!tracks.length) return;
  if(!currentId && tracks.length) { playById(tracks[0].id); return; }
  if(playing){
    audio.pause();
    playing=false;
    playBtn.textContent="Play";
    vinyl.classList.remove("spinning");
  }else{
    audio.play();
    playing=true;
    playBtn.textContent="Pause";
    vinyl.classList.add("spinning");
  }
}

function next(){
  if(!tracks.length) return;
  let i=tracks.findIndex(t=>t.id===currentId);
  i=(i+1)%tracks.length;
  playById(tracks[i].id);
}

function prev(){
  if(!tracks.length) return;
  let i=tracks.findIndex(t=>t.id===currentId);
  i=(i-1+tracks.length)%tracks.length;
  playById(tracks[i].id);
}

audio.addEventListener("ended",next);

/* ── PROGRESS BAR (display only) ───────────────── */
audio.addEventListener("loadedmetadata",()=>{
  durationEl.textContent=format(audio.duration);
});

audio.addEventListener("timeupdate",()=>{
  if(!audio.duration||isNaN(audio.duration)) return;
  progressEl.value=(audio.currentTime/audio.duration)*100;
  currentTimeEl.textContent=format(audio.currentTime);
  durationEl.textContent=format(audio.duration);
});

/* ── DELETE ─────────────────────────────────────── */
async function remove(id){
  const db=await openDB();
  const tx=db.transaction("tracks","readwrite");
  tx.objectStore("tracks").delete(id);
  const i=tracks.findIndex(t=>t.id===id);
  if(i>-1){URL.revokeObjectURL(tracks[i].url);tracks.splice(i,1);}
  if(currentId===id){
    audio.pause();audio.src="";
    currentId=null;playing=false;
    titleEl.textContent="No song playing";
    playBtn.textContent="Play";
    progressEl.value=0;
    currentTimeEl.textContent="0:00";
    durationEl.textContent="0:00";
    vinyl.classList.remove("spinning");
  }
  render();
}

/* ── EDIT MODE TOGGLE ───────────────────────────── */
const editBtn=document.getElementById("editBtn");

function toggleEdit(){
  editMode=!editMode;
  editBtn.textContent=editMode?"Done":"Edit";
  editBtn.classList.toggle("active",editMode);
  queueEl.classList.toggle("editing",editMode);
}

/* ── MOVE TRACK ─────────────────────────────────── */
function moveTrack(idx,dir){
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=tracks.length) return;
  const tmp=tracks[idx];
  tracks[idx]=tracks[newIdx];
  tracks[newIdx]=tmp;
  render();
  // Re-apply editing class after re-render
  if(editMode) queueEl.classList.add("editing");
}

/* ── RENDER ─────────────────────────────────────── */
function render(){
  queueEl.innerHTML="";
  tracks.forEach((t,idx)=>{
    const div=document.createElement("div");
    div.className="item";

    div.innerHTML=`
      <div class="reorder-btns">
        <button class="move-btn" onclick="moveTrack(${idx},-1)" ${idx===0?"disabled":""}>▲</button>
        <button class="move-btn" onclick="moveTrack(${idx},1)" ${idx===tracks.length-1?"disabled":""}>▼</button>
      </div>
      <span class="track-name" onclick="playById(${t.id})">${clean(t.name)}</span>
      <button class="del" onclick="remove(${t.id})">×</button>
    `;

    queueEl.appendChild(div);
  });

  // Preserve edit mode after re-render
  if(editMode) queueEl.classList.add("editing");
}

/* ── INIT ───────────────────────────────────────── */
fileInput.addEventListener("change",async e=>{
  for(const f of e.target.files) await saveFile(f);
  fileInput.value="";
  loadFiles();
});

loadFiles();
</script>

</body>
</html>
