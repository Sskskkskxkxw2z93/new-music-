<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0b0b;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

header {
  width:100%;
  max-width:500px;
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

button {
  border:none;
  padding:10px 14px;
  border-radius:10px;
  background:#1e1e1e;
  color:white;
  cursor:pointer;
}

.primary {
  background:#ffffff;
  color:#000;
}

.player {
  width:100%;
  max-width:500px;
  background:#151515;
  padding:15px;
  border-radius:14px;
}

audio {
  width:100%;
  margin-top:10px;
}

.controls {
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:10px;
}

.list {
  margin-top:15px;
  width:100%;
  max-width:500px;
}

.item {
  display:flex;
  justify-content:space-between;
  padding:10px;
  margin:6px 0;
  background:#1e1e1e;
  border-radius:10px;
}

.item.active {
  border-left:3px solid #fff;
}

.small {
  font-size:12px;
  opacity:0.6;
}
</style>
</head>

<body>

<header>
  <h3>Music</h3>
  <button onclick="file.click()">Add</button>
</header>

<div class="player">

<input id="file" type="file" accept="audio/*" multiple>

<audio id="audio"></audio>

<div class="controls">
  <button onclick="prev()">Prev</button>
  <button class="primary" onclick="toggle()" id="playBtn">Play</button>
  <button onclick="next()">Next</button>
</div>

</div>

<div class="list" id="list"></div>

<script>
const file = document.getElementById("file");
const audio = document.getElementById("audio");
const list = document.getElementById("list");
const playBtn = document.getElementById("playBtn");

let db;
let tracks = [];
let current = 0;
let playing = false;

/* ---------- INIT DB ---------- */
function openDB(){
  return new Promise((res)=>{
    const request = indexedDB.open("musicDB",1);

    request.onupgradeneeded = e=>{
      const db = e.target.result;
      db.createObjectStore("tracks",{keyPath:"id",autoIncrement:true});
    };

    request.onsuccess = ()=>res(request.result);
  });
}

/* ---------- SAVE FILE ---------- */
async function saveFile(file){
  const db = await openDB();

  return new Promise((res)=>{
    const tx = db.transaction("tracks","readwrite");
    const store = tx.objectStore("tracks");

    store.add({
      name:file.name,
      blob:file
    });

    tx.oncomplete = ()=>res();
  });
}

/* ---------- LOAD FILES ---------- */
async function loadFiles(){
  const db = await openDB();

  return new Promise((res)=>{
    const tx = db.transaction("tracks","readonly");
    const store = tx.objectStore("tracks");

    const req = store.getAll();

    req.onsuccess = ()=>{
      tracks = req.result.map(t=>({
        id:t.id,
        name:t.name,
        url:URL.createObjectURL(t.blob)
      }));

      render();
      res();
    };
  });
}

/* ---------- FILE INPUT ---------- */
file.addEventListener("change", async (e)=>{
  const files=[...e.target.files];

  for(let f of files){
    await saveFile(f);
  }

  await loadFiles();
  play(tracks.length-1);
});

/* ---------- PLAY ---------- */
function play(i){
  if(!tracks.length) return;

  current=i;

  audio.src=tracks[i].url;
  audio.play();

  playing=true;
  playBtn.textContent="Pause";

  render();
}

/* ---------- TOGGLE ---------- */
function toggle(){
  if(!tracks.length) return;

  if(playing){
    audio.pause();
    playing=false;
    playBtn.textContent="Play";
  } else {
    audio.play();
    playing=true;
    playBtn.textContent="Pause";
  }
}

/* ---------- NEXT / PREV ---------- */
function next(){
  if(!tracks.length) return;
  play((current+1)%tracks.length);
}

function prev(){
  if(!tracks.length) return;
  play((current-1+tracks.length)%tracks.length);
}

/* ---------- DELETE ---------- */
async function remove(id){
  const db = await openDB();

  const tx = db.transaction("tracks","readwrite");
  tx.objectStore("tracks").delete(id);

  tx.oncomplete = async ()=>{
    await loadFiles();
  };
}

/* ---------- RENDER ---------- */
function render(){
  list.innerHTML="";

  tracks.forEach((t,i)=>{
    const div=document.createElement("div");
    div.className="item"+(i===current?" active":"");

    div.innerHTML=`
      <div onclick="play(${i})">
        ${t.name}
        <div class="small">local</div>
      </div>
      <button onclick="remove(${t.id})">Delete</button>
    `;

    list.appendChild(div);
  });
}

/* ---------- AUTO NEXT ---------- */
audio.addEventListener("ended",next);

/* ---------- INIT ---------- */
loadFiles();
</script>

</body>
</html>
