<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dark Music App</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #000;
    color: #fff;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px;
    font-size: 1.5em;
    background-color: #111;
  }

  #add-music {
    background-color: #222;
    border: none;
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.9em;
    color: #fff;
    transition: background-color 0.2s;
  }

  #add-music:hover {
    background-color: #333;
  }

  #now-playing {
    text-align: center;
    padding: 40px 20px;
  }

  #music-icon {
    font-size: 3em;
    margin-bottom: 10px;
  }

  #song-title {
    font-size: 1.2em;
    margin-bottom: 10px;
  }

  #controls {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 20px 0;
  }

  #controls button {
    background: none;
    border: none;
    cursor: pointer;
    color: #fff;
    font-size: 1.5em;
    transition: color 0.2s;
  }

  #controls button:hover {
    color: #1e90ff;
  }

  #seek-bar {
    width: 100%;
    -webkit-appearance: none;
    height: 4px;
    background: #444;
    outline: none;
    margin: 0 20px;
  }

  #seek-bar::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 12px;
    height: 12px;
    background: #fff;
    border-radius: 50%;
    cursor: pointer;
  }

  #queue {
    padding: 20px;
  }

  #queue-title {
    font-weight: bold;
    margin-bottom: 10px;
  }

  .track {
    padding: 10px 0;
    border-bottom: 1px solid #222;
  }

  /* Scrollbar styling for queue */
  #queue::-webkit-scrollbar {
    width: 6px;
  }

  #queue::-webkit-scrollbar-thumb {
    background-color: #555;
    border-radius: 3px;
  }
</style>
</head>
<body>

<header>
  <div>tune.</div>
  <button id="add-music">+ Add Music</button>
</header>

<div id="now-playing">
  <div id="music-icon">🎵</div>
  <div id="song-title">No track selected</div>
</div>

<div id="controls">
  <button id="prev" title="Previous">⏮️</button>
  <button id="play" title="Play/Pause">▶️</button>
  <button id="next" title="Next">⏭️</button>
</div>

<input type="range" id="seek-bar" min="0" max="100" value="0" />

<div id="queue">
  <div id="queue-title">QUEUE</div>
  <div id="tracks-list">No tracks added yet. Tap "+ Add Music" to add songs.</div>
</div>

<audio id="audio" controls style="display:none;"></audio>

<script>
  const audio = document.getElementById('audio');
  const songTitle = document.getElementById('song-title');
  const tracksList = document.getElementById('tracks-list');
  const playBtn = document.getElementById('play');
  const prevBtn = document.getElementById('prev');
  const nextBtn = document.getElementById('next');
  const seekBar = document.getElementById('seek-bar');
  const addMusicBtn = document.getElementById('add-music');

  let playlist = [];
  let currentIndex = -;
  let isPlaying = false;

  // Function to update the queue display
  function renderQueue() {
    if (playlist.length === 0) {
      tracksList.innerHTML = 'No tracks added yet. Tap "+ Add Music" to add songs.';
      return;
    }
    tracksList.innerHTML = '';
    playlist.forEach((track, index) => {
      const trackDiv = document.createElement('div');
      trackDiv.className = 'track';
      trackDiv.textContent = track.title;
      trackDiv.addEventListener('click', () => {
        playTrack(index);
      });
      tracksList.appendChild(trackDiv);
    });
  }

  // Function to play a specific track
  function playTrack(index) {
    currentIndex = index;
    const track = playlist[index];
    audio.src = track.url;
    songTitle.textContent = track.title;
    audio.play();
    isPlaying = true;
    playBtn.textContent = '⏸️';
  }

  // Play/Pause button
  document.getElementById('play').addEventListener('click', () => {
    if (!audio.src) return;
    if (audio.paused) {
      audio.play();
    } else {
      audio.pause();
    }
  });

  // Previous track
  prevBtn.addEventListener('click', () => {
    if (playlist.length === 0) return;
    currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
    playTrack(currentIndex);
  });

  // Next track
  nextBtn.addEventListener('click', () => {
    if (playlist.length === 0) return;
    currentIndex = (currentIndex + 1) % playlist.length;
    playTrack(currentIndex);
  });

  // Update seek bar
  audio.addEventListener('timeupdate', () => {
    if (audio.duration) {
      seekBar.value = (audio.currentTime / audio.duration) * 100;
    }
  });

  // Seek functionality
  seekBar.addEventListener('input', () => {
    if (audio.duration) {
      audio.currentTime = (seekBar.value / 100) * audio.duration;
    }
  });

  // Handle end of track
  audio.addEventListener('ended', () => {
    nextBtn.click();
  });

  // Add music (simulate adding songs)
  addMusicBtn.addEventListener('click', () => {
    const title = prompt('Enter song title:');
    const url = prompt('Enter song URL:');
    if (title && url) {
      playlist.push({ title, url });
      renderQueue();
    }
  });

  // When a track starts playing
  audio.addEventListener('play', () => {
    isPlaying = true;
    playBtn.textContent = '⏸️';
  });

  // When a track pauses
  audio.addEventListener('pause', () => {
    isPlaying = false;
    playBtn.textContent = '▶️';
  });

  // Initialize
  renderQueue();
</script>

</body>
</html>
