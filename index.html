<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Simple Music App</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #121212;
    color: #eee;
  }

  header {
    padding: 20px;
    background-color: #1f1f1f;
    text-align: center;
    font-size: 1.5em;
  }

  #song-list {
    display: flex;
    flex-direction: column;
    padding: 20px;
  }

  .song {
    padding: 10px 15px;
    margin: 5px 0;
    background-color: #2c2c2c;
    border-radius: 5px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background-color 0.2s;
  }

  .song:hover {
    background-color: #3a3a3a;
  }

  .song-info {
    flex: 1;
  }

  .song-title {
    font-weight: bold;
  }

  /* Optional: Add a footer or controls area */
  #player-controls {
    position: fixed;
    bottom: 0;
    width: 100%;
    background-color: #1f1f1f;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  button {
    background-color: #333;
    border: none;
    padding: 8px 12px;
    border-radius: 4px;
    color: #eee;
    cursor: pointer;
    transition: background-color 0.2s;
  }

  button:hover {
    background-color: #555;
  }
</style>
</head>
<body>

<header>My Music App</header>

<div id="song-list">
  <!-- Songs will be listed here -->
</div>

<!-- Optional: Music player controls -->
<div id="player-controls">
  <button id="prev">Prev</button>
  <button id="play">Play</button>
  <button id="next">Next</button>
</div>

<!-- Optional: Audio element for playback -->
<audio id="audio-player" controls style="width: 100%; display: none;"></audio>

<script>
  // Example list of songs
  const songs = [
    { title: "Song One", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
    { title: "Song Two", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
    { title: "Song Three", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" },
    // Add more songs here
  ];

  const songListDiv = document.getElementById('song-list');
  const audioPlayer = document.getElementById('audio-player');
  let currentSongIndex = 0;

  function renderSongs() {
    songListDiv.innerHTML = '';
    songs.forEach((song, index) => {
      const songDiv = document.createElement('div');
      songDiv.className = 'song';
      songDiv.innerHTML = `
        <div class="song-info">
          <div class="song-title">${song.title}</div>
        </div>
        <button data-index="${index}">Play</button>
      `;
      songDiv.querySelector('button').addEventListener('click', () => {
        playSong(index);
      });
      songListDiv.appendChild(songDiv);
    });
  }

  function playSong(index) {
    currentSongIndex = index;
    const song = songs[index];
    audioPlayer.src = song.url;
    audioPlayer.style.display = 'block';
    audioPlayer.play();
  }

  document.getElementById('prev').addEventListener('click', () => {
    currentSongIndex = (currentSongIndex - 1 + songs.length) % songs.length;
    playSong(currentSongIndex);
  });

  document.getElementById('next').addEventListener('click', () => {
    currentSongIndex = (currentSongIndex + 1) % songs.length;
    playSong(currentSongIndex);
  });

  document.getElementById('play').addEventListener('click', () => {
    if (audioPlayer.src) {
      if (audioPlayer.paused) {
        audioPlayer.play();
      } else {
        audioPlayer.pause();
      }
    }
  });

  // Initialize the list
  renderSongs();
</script>

</body>
</html>
