<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Music</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#121212">

<style>
:root{
  --bg:#121212;
  --card:#181818;
  --card2:#222;
  --text:#fff;
  --muted:#b3b3b3;
  --green:#1db954;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:-apple-system,Arial;
  background:var(--bg);
  color:var(--text);
  padding:16px;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}

.logo{
  font-weight:700;
  font-size:20px;
  letter-spacing:0.5px;
}

.add{
  background:var(--green);
  border:none;
  padding:8px 14px;
  border-radius:20px;
  color:#000;
  font-weight:600;
}

/* NOW PLAYING */
.now{
  background:linear-gradient(145deg,#1e1e1e,#111);
  border-radius:16px;
  padding:18px;
  margin-bottom:14px;
}

.art{
  width:100%;
  aspect-ratio:1;
  border-radius:14px;
  background:radial-gradient(circle,#333,#111);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:48px;
  margin-bottom:10px;
  position:relative;
  overflow:hidden;
}

.vinyl{
  width:70%;
  height:70%;
  border-radius:50%;
  background:conic-gradient(#111 0 20%, #333 20% 40%, #111 40% 60%, #333 60% 80%, #111 80% 100%);
  animation:spin 4s linear infinite;
  display:none;
}

.playing .vinyl{display:block;}

@keyframes spin{
  from{transform:rotate(0)}
  to{transform:rotate(360deg)}
}

.title{
  font-size:18px;
  font-weight:600;
}
.sub{
  font-size:12px;
  color:var(--muted);
  margin-bottom:10px;
}

/* CONTROLS */
.controls{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:12px;
}

.btn{
  background:#282828;
  border:none;
  color:white;
  padding:10px 12px;
  border-radius:50%;
  cursor:pointer;
}

.play{
  width:56px;
  height:56px;
  border-radius:50%;
  background:var(--green);
  color:#000;
  font-size:18px;
}

/* QUEUE */
.queue{
  margin-top:14px;
}

.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  margin:6px 0;
  background:var(--card);
  border-radius:10px;
  cursor:pointer;
}

.item:hover{
  background:var(--card2);
}

.item.active{
  border-left:3px solid var(--green);
}

.small{
  font-size:12px;
  color:var(--muted);
}

.del{
  background:none;
  border:none;
  color:#888;
}
.del:hover{color:#ff4d4d}

/* hidden input */
input{display:none;}
</style>
</head>

<body>

<header>
  <div class="logo">Music</div>
  <button class="add" onclick="file.click()">+ Add</button>
</header>

<div class="now" id="now">

  <div class="art">
    <div class="vinyl"></div>
  </div>

  <div class="title" id="title">No song playing</div>
  <div class="sub" id="sub">Add music to start</div>

  <audio id="audio"></audio>

  <div class="controls">
    <button class="btn" onclick="prev()">⏮</button>
    <button class="play" onclick="toggle()" id="playBtn">▶</button>
    <button class="btn" onclick="next()">⏭</button>
  </div>

</div>

<div class="queue" id="queue"></div>

<input type="file" id="file" accept="audio/*,video/mp4,.mp3,.m4a,.wav,.aac" multiple>

<script>
const file=document.getElementById("file");
const audio=document.getElementById("audio");
const queue=document.getElementById("queue");
const playBtn=document.getElementById("playBtn");
const now=document.getElementById("now");
const title=document.getElementById("title");
const sub=document.getElementById("sub");

let tracks=JSON.parse(localStorage.getItem("tracks")||"[]");
let current=0;
let playing=false;

/* SAVE */
function save(){
  localStorage.setItem("tracks",JSON.stringify(tracks));
}

/* ART TEXT */
function art(name){
  title.textContent=name;
  sub.textContent="Local file";
}

/* RENDER */
function render(){
  queue.innerHTML="";

  tracks.forEach((t,i)=>{
    const div=document.createElement("div");
    div.className="item"+(i===current?" active":"");

    div.innerHTML=`
      <div onclick="play(${i})">
        ${t.name}
        <div class="small">track</div>
      </div>
      <button class="del" onclick="removeSong(${i})">🗑</button>
    `;

    queue.appendChild(div);
  });
}

/* PLAY */
function play(i){
  if(!tracks.length) return;

  current=i;
  audio.src=tracks[i].url;
  audio.play();

  playing=true;
  playBtn.textContent="⏸";
  now.classList.add("playing");

  art(tracks[i].name);
  render();
}

/* TOGGLE */
function toggle(){
  if(!tracks.length) return;

  if(playing){
    audio.pause();
    playing=false;
    playBtn.textContent="▶";
    now.classList.remove("playing");
  }else{
    audio.play();
    playing=true;
    playBtn.textContent="⏸";
    now.classList.add("playing");
  }
}

/* NEXT / PREV */
function next(){
  if(!tracks.length) return;
  play((current+1)%tracks.length);
}

function prev(){
  if(!tracks.length) return;
  play((current-1+tracks.length)%tracks.length);
}

/* REMOVE */
function removeSong(i){
  tracks.splice(i,1);
  save();
  render();
}

/* ADD FILES */
file.addEventListener("change",(e)=>{
  const files=[...e.target.files];

  files.forEach(f=>{
    const url=URL.createObjectURL(f);
    tracks.push({name:f.name,url});
  });

  save();
  render();
  play(tracks.length-1);
});

/* AUTO NEXT */
audio.addEventListener("ended",next);

/* INIT */
render();
</script>

</body>
</html>
