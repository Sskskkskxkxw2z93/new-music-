<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tune</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@300;400;500&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:#050506;
  --surface:#111114;
  --surface2:#1a1a1d;
  --border:#2a2a2e;
  --accent:#ffffff;
  --text:#f5f5f5;
  --muted:#8a8a8f;
}

body {
  background: radial-gradient(circle at top, #121216, var(--bg));
  color: var(--text);
  font-family: 'DM Mono', monospace;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

header {
  width:100%;
  max-width:480px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.logo {
  font-family:'DM Serif Display', serif;
  font-size:26px;
  color:var(--accent);
}

button {
  cursor:pointer;
}

.add-btn {
  background:var(--accent);
  color:#000;
  border:none;
  padding:8px 14px;
  border-radius:20px;
  font-size:12px;
}

.player {
  width:100%;
  max-width:480px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
}

input[type=file] {
  margin-bottom:10px;
  color:white;
}

audio {
  width:100%;
  margin-top:10px;
}

.controls {
  display:flex;
  justify-content:center;
  gap:15px;
  margin-top:10px;
}

.controls button {
  background:var(--surface2);
  border:none;
  color:var(--text);
  padding:10px 12px;
  border-radius:10px;
}

.play {
  background:var(--accent);
  color:#000;
}

.queue {
  margin-top:15px;
}

.item {
  padding:10px;
  margin:6px 0;
  background:var(--surface2);
  border-radius:10px;
  cursor:pointer;
  font-size:13px;
}

.item.active {
  background:var(--accent);
  color:#000;
}
</style>
</head>

<body>

<header>
  <div class="logo">tune.</div>
  <button class="add-btn" onclick="file.click()">Add</button>
</header>

<div class="player">

<input id="file" type="file" accept="audio/*,video/mp4,.mp3,.m4a,.wav,.aac" multiple>

<audio id="audio"></audio>

<div class="controls">
  <button onclick="prev()">⏮</button>
  <button class="play" onclick="toggle()">▶</button>
  <button onclick="next()">⏭</button>
</div>

<div class="queue" id="queue"></div>

</div>

<script>
const file = document.getElementById('file');
const audio = document.getElementById('audio');
const queue = document.getElementById('queue');

let tracks = [];
let current = 0;

function render() {
  queue.innerHTML = "";

  tracks.forEach((t,i)=>{
    let div = document.createElement("div");
    div.className = "item" + (i===current?" active":"");
    div.textContent = t.name;
    div.onclick = ()=>play(i);
    queue.appendChild(div);
  });
}

file.addEventListener("change",(e)=>{
  const files = [...e.target.files];

  files.forEach(f=>{
    const url = URL.createObjectURL(f);
    tracks.push({name:f.name,url});
  });

  render();
  play(0);
});

function play(i){
  if(!tracks.length) return;

  current=i;

  audio.pause();
  audio.src = tracks[i].url;
  audio.load();

  const p = audio.play();
  if(p) p.catch(()=>{});

  render();
}

function toggle(){
  if(audio.paused){
    audio.play();
  } else {
    audio.pause();
  }
}

function next(){
  if(!tracks.length) return;
  play((current+1)%tracks.length);
}

function prev(){
  if(!tracks.length) return;
  play((current-1+tracks.length)%tracks.length);
}

audio.addEventListener("ended",next);
</script>

</body>
</html>
