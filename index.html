
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tune</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* DARK THEME */
:root {
  --bg: #070708;
  --surface: #111214;
  --surface2: #1a1b1e;
  --border: #2a2b30;

  --accent: #d4b06a;
  --accent2: #b8924f;

  --text: #f5f5f3;
  --muted: #8b8b92;

  --radius: 16px;
}

body {
  background:
    radial-gradient(circle at top, #16171a 0%, #070708 60%);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 24px 16px 40px;
}

header {
  width: 100%;
  max-width: 480px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
}

.logo {
  font-family: 'DM Serif Display', serif;
  font-size: 28px;
  color: var(--accent);
  letter-spacing: -0.5px;
}

.add-btn {
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 50px;
  padding: 8px 20px;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
  box-shadow: 0 6px 18px rgba(212,176,106,0.35);
}

.add-btn:hover {
  background: var(--accent2);
  transform: translateY(-1px);
}

/* Player Card */
.player-card {
  width: 100%;
  max-width: 480px;
  background: rgba(17,18,20,0.9);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 24px 24px;
  margin-bottom: 24px;

  backdrop-filter: blur(10px);

  box-shadow:
    0 10px 30px rgba(0,0,0,0.35),
    inset 0 1px 0 rgba(255,255,255,0.02);
}

.now-playing-label {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 20px;
}

.art-container {
  width: 100%;
  aspect-ratio: 1;
  background: var(--surface2);
  border-radius: 12px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

.art-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  color: var(--muted);
  font-size: 12px;
}

.art-placeholder svg {
  opacity: 0.4;
}

.art-container.playing .vinyl {
  animation: spin 4s linear infinite;
}

.vinyl {
  width: 80%;
  height: 80%;
  border-radius: 50%;
  background: radial-gradient(circle at center,
    #0f1012 20%,
    #202124 21%,
    #202124 30%,
    #0f1012 31%,
    #0f1012 40%,
    #2e2f35 41%,
    #0f1012 42%,
    #0f1012 100%
  );

  box-shadow: 0 8px 32px rgba(0,0,0,0.6);

  display: none;
  align-items: center;
  justify-content: center;
}

.vinyl.active {
  display: flex;
}

.vinyl-center {
  width: 18%;
  height: 18%;
  border-radius: 50%;
  background: var(--accent);
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.track-info {
  margin-bottom: 20px;
}

.track-title {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 4px;
}

.track-artist {
  font-size: 12px;
  color: var(--muted);
}

/* Progress */
.progress-area {
  margin-bottom: 20px;
}

.progress-bar-wrap {
  width: 100%;
  height: 4px;
  background: var(--surface2);
  border-radius: 2px;
  cursor: pointer;
  margin-bottom: 8px;
  position: relative;
}

.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  width: 0%;
  transition: width 0.1s linear;
  pointer-events: none;

  box-shadow: 0 0 10px rgba(212,176,106,0.5);
}

.progress-times {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--muted);
}

/* Controls */
.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
}

.ctrl-btn {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  padding: 8px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.15s, transform 0.1s;
}

.ctrl-btn:hover {
  color: var(--text);
  transform: scale(1.1);
}

.play-btn {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--accent);
  color: var(--bg);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;

  box-shadow:
    0 6px 18px rgba(212,176,106,0.35);
}

.play-btn:hover {
  background: var(--accent2);
  transform: scale(1.05);
}

/* Volume */
.volume-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 20px;
}

.volume-row svg {
  color: var(--muted);
  flex-shrink: 0;
}

input[type=range] {
  -webkit-appearance: none;
  flex: 1;
  height: 3px;
  background: var(--surface2);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
}

/* Queue */
.queue-header {
  width: 100%;
  max-width: 480px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.queue-title {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
}

.queue-count {
  font-size: 11px;
  color: var(--muted);
}

.queue {
  width: 100%;
  max-width: 480px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.queue-item {
  background: rgba(17,18,20,0.9);
  border: 1px solid transparent;
  border-radius: 10px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: all 0.15s;

  backdrop-filter: blur(10px);

  box-shadow:
    0 10px 30px rgba(0,0,0,0.25),
    inset 0 1px 0 rgba(255,255,255,0.02);
}

.queue-item:hover {
  border-color: var(--border);
  background: var(--surface2);
}

.queue-item.active {
  border-color: var(--accent);
  background: #202127;
}

.q-num {
  font-size: 11px;
  color: var(--muted);
  width: 18px;
  text-align: center;
  flex-shrink: 0;
}

.queue-item.active .q-num {
  color: var(--accent);
}

.q-info {
  flex: 1;
  overflow: hidden;
}

.q-title {
  font-size: 13px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.queue-item.active .q-title {
  color: var(--accent);
}

.q-dur {
  font-size: 11px;
  color: var(--muted);
  flex-shrink: 0;
}

.q-remove {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  padding: 4px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  opacity: 0;
  transition: opacity 0.15s;
}

.queue-item:hover .q-remove {
  opacity: 1;
}

.q-remove:hover {
  color: #e07070;
}

.empty-queue {
  text-align: center;
  color: var(--muted);
  font-size: 12px;
  padding: 24px;
  border: 1px dashed var(--border);
  border-radius: 10px;
}

/* Hidden file input */
#file-input {
  display: none;
}

/* Eq Bars */
.eq-bars {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 14px;
}

.eq-bar {
  width: 3px;
  background: var(--accent);
  border-radius: 2px;
  animation: eq 0.8s ease-in-out infinite alternate;
}

.eq-bar:nth-child(1) {
  animation-duration: 0.6s;
}

.eq-bar:nth-child(2) {
  animation-duration: 0.9s;
  animation-delay: 0.1s;
}

.eq-bar:nth-child(3) {
  animation-duration: 0.7s;
  animation-delay: 0.2s;
}

@keyframes eq {
  from { height: 3px; }
  to { height: 14px; }
}
</style>
</head>

<body>

<header>
  <div class="logo">tune.</div>

  <button class="add-btn">
    Add Music
  </button>
</header>

<div class="player-card">

  <div class="now-playing-label">
    Now Playing
  </div>

  <div class="art-container">
    <div class="vinyl active">
      <div class="vinyl-center"></div>
    </div>
  </div>

  <div class="track-info">
    <div class="track-title">
      Midnight Echo
    </div>

    <div class="track-artist">
      Local File
    </div>
  </div>

  <div class="progress-area">
    <div class="progress-bar-wrap">
      <div class="progress-fill"></div>
    </div>

    <div class="progress-times">
      <span>1:24</span>
      <span>3:52</span>
    </div>
  </div>

  <div class="controls">

    <button class="ctrl-btn">⏮</button>

    <button class="play-btn">▶</button>

    <button class="ctrl-btn">⏭</button>

  </div>

  <div class="volume-row">
    <span>🔉</span>

    <input type="range" min="0" max="100" value="80">

    <span>🔊</span>
  </div>

</div>

<div class="queue-header">
  <span class="queue-title">Queue</span>
  <span class="queue-count">3 tracks</span>
</div>

<div class="queue">

  <div class="queue-item active">
    <div class="q-num">1</div>

    <div class="q-info">
      <div class="q-title">Midnight Echo</div>
    </div>

    <div class="q-dur">3:52</div>
  </div>

  <div class="queue-item">
    <div class="q-num">2</div>

    <div class="q-info">
      <div class="q-title">Neon Dreams</div>
    </div>

    <div class="q-dur">4:10</div>
  </div>

  <div class="queue-item">
    <div class="q-num">3</div>

    <div class="q-info">
      <div class="q-title">Lost Frequencies</div>
    </div>

    <div class="q-dur">2:48</div>
  </div>

</div>

</body>
</html>
```
