<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dark Music App</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #000;
    color: #fff;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px;
    font-size: 1.5em;
    background-color: #111;
  }

  #add-music-button {
    background-color: #222;
    border: none;
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.9em;
    color: #fff;
    transition: background-color 0.2s;
  }

  #add-music-button:hover {
    background-color: #333;
  }

  #file-input {
    display: none;
  }

  #now-playing {
    text-align: center;
    padding: 40px 20px;
  }

  #music-icon {
    font-size: 3em;
    margin-bottom: 10px;
  }

  #song-title {
    font-size: 1.2em;
    margin-bottom: 10px;
  }

  #controls {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 20px 0;
  }

  #controls button {
    background: none;
    border: none;
    cursor: pointer;
    color: #fff;
    font-size: 1.5em;
    transition: color 0.2s;
  }

  #controls button:hover {
    color: #1e90ff;
  }

  #seek-bar {
    width: 100%;
    -webkit-appearance: none;
    height: 4px;
    background: #444;
    outline: none;
    margin: 0 20px;
  }

  #seek-bar::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 12px;
    height: 12px;
    background: #fff;
    border-radius: 50%;
    cursor: pointer;
  }

  #queue {
    padding: 20px;
  }

  #queue-title {
    font-weight: bold;
    margin-bottom: 10px;
  }

  .track {
    padding: 10px 0;
    border-bottom: 1px solid #222;
    cursor: pointer;
    transition: background 0.2s;
  }

  .track:hover {
    background-color: #222;
  }

  /* Scrollbar styling for queue */
  #queue::-webkit-scrollbar {
    width: 6px;
  }

  #queue::-webkit-scrollbar-thumb {
    background-color: #555;
    border-radius: 3px;
  }
</style>
</head>
<body>

<header>
  <div>tune.</div>
  <button id="add-music-btn">+ Add Music</button>
  <input type="file" id="file-input" accept="audio/*" multiple />
</header>

<div id="now-playing">
  <div id="music-icon">🎵</div>
  <div id="song-title">No track selected</div>
</div>

<div id="controls">
  <button id="prev" title="Previous">⏮️</button>
  <button id="play" title="Play/Pause">▶️</button>
  <button id="next" title="Next">⏭️</button>
</div>

<input type="range" id="seek-bar" min="0" max="100" value="0" />

<div id="queue">
  <div id="queue-title">QUEUE</div>
  <div id="tracks-list">No tracks added yet. Use "+ Add Music" to select files.</div>
</div>

<audio id="audio" controls style="display:none;"></audio>

<script>
  const audio = document.getElementById('audio');
  const songTitle = document.getElementById('song-title');
  const tracksList = document.getElementById('tracks-list');
  const playBtn = document.getElementById('play');
  const prevBtn = document.getElementById('prev');
  const nextBtn = document.getElementById('next');
  const seekBar = document.getElementById('seek-bar');
  const addMusicBtn = document.getElementById('add-music-btn');
  const fileInput = document.getElementById('file-input');

  let playlist = [];
  let currentIndex = -;
  let isPlaying = false;

  // Render queue
  function renderQueue() {
    if (playlist.length === 0) {
      tracksList.innerHTML = 'No tracks added yet. Use "+ Add Music" to select files.';
      return;
    }
    tracksList.innerHTML = '';
    playlist.forEach((track, index) => {
      const trackDiv = document.createElement('div');
      trackDiv.className = 'track';
      trackDiv.textContent = track.title;
      trackDiv.addEventListener('click', () => {
        playTrack(index);
      });
      tracksList.appendChild(trackDiv);
    });
  }

  // Play a specific track
  function playTrack(index) {
    currentIndex = index;
    const track = playlist[index];
    audio.src = track.url;
    songTitle.textContent = track.title;
    audio.play();
  }

  // Handle play/pause
  document.getElementById('play').addEventListener('click', () => {
    if (!audio.src) return;
    if (audio.paused) {
      audio.play();
    } else {
      audio.pause();
    }
  });

  // Previous track
  prevBtn.addEventListener('click', () => {
    if (playlist.length === 0) return;
    currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
    playTrack(currentIndex);
  });

  // Next track
  nextBtn.addEventListener('click', () => {
    if (playlist.length === 0) return;
    currentIndex = (currentIndex + 1) % playlist.length;
    playTrack(currentIndex);
  });

  // Update seek bar
  audio.addEventListener('timeupdate', () => {
    if (audio.duration) {
      seekBar.value = (audio.currentTime / audio.duration) * 100;
    }
  });

  // Seek
  seekBar.addEventListener('input', () => {
    if (audio.duration) {
      audio.currentTime = (seekBar.value / 100) * audio.duration;
    }
  });

  // When track ends
  audio.addEventListener('ended', () => {
    nextBtn.click();
  });

  // Open file dialog on button click
document.getElementById('add-music-btn').addEventListener('click', () => {
  fileInput.click();
});

// Handle selected files
fileInput.addEventListener('change', () => {
  const files = Array.from(fileInput.files);
  files.forEach(file => {
    const url = URL.createObjectURL(file);
    playlist.push({ title: file.name, url });
  });
  renderQueue();
});

  // Initialize with sample songs (optional)
  // Uncomment below if you want default songs
  /*
  playlist = [
    { title: "Sample Song 1", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
    { title: "Sample Song 2", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" }
  ];
  renderQueue();
  */

</script>

</body>
</html>
